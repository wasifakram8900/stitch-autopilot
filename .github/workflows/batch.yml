name: stitch-batch

# Sheets-free batch: runs the 3 baked-in businesses end to end in GitHub's cloud.
# No Google Sheets, no LLM. Needs only 2 repo secrets: STITCH_KEY, NETLIFY_TOKEN.
# Live URLs show in the run log AND are uploaded as the "batch-results" artifact.

on:
  workflow_dispatch: {}          # run on demand from the Actions tab

concurrency:
  group: stitch-batch
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Write secret files
        run: |
          printf '%s' "${STITCH_KEY}"    > .stitch_key
          printf '%s' "${NETLIFY_TOKEN}" > .netlify_token
        env:
          STITCH_KEY:    ${{ secrets.STITCH_KEY }}
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}

      - name: Run batch (sequential trigger chain)
        env:
          DEVICE: DESKTOP
        run: python -u run_batch.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-results
          path: |
            out/batch_results.json
            out/batch/**/index.html
