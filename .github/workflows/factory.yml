name: factory

# Agent-team website factory, PARALLEL: a plan job lists the businesses, then a matrix job
# builds each in its own runner (designer team -> Stitch -> qa.py hard gates incl. headless
# booking test -> Netlify). max-parallel throttles to avoid Stitch rate-limiting.
# Needs 2 secrets: STITCH_KEY, NETLIFY_TOKEN. Live URLs + scorecards upload per business.

on:
  workflow_dispatch:
    inputs:
      only:
        description: "Optional 1-based business index (blank = all, parallel)"
        required: false
        default: ""

concurrency:
  group: factory
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      indices: ${{ steps.gen.outputs.indices }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - id: gen
        env:
          ONLY: ${{ github.event.inputs.only }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import businesses, json, os
          only = os.environ.get("ONLY", "").strip()
          idx = [int(only)] if only.isdigit() else list(range(1, len(businesses.BUSINESSES) + 1))
          print("indices=" + json.dumps(idx))
          PY

  build:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4          # throttle: Stitch rate-limits rapid concurrent gens
      matrix:
        i: ${{ fromJSON(needs.plan.outputs.indices) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps chromium

      - name: Write secret files
        run: |
          printf '%s' "${STITCH_KEY}"    > .stitch_key
          printf '%s' "${NETLIFY_TOKEN}" > .netlify_token
        env:
          STITCH_KEY:    ${{ secrets.STITCH_KEY }}
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}

      - name: Build asset packs (offline)
        run: python import_assets.py

      - name: Build business ${{ matrix.i }} (designer -> Stitch -> QA gates -> deploy)
        env:
          DEVICE: DESKTOP
          HEADLESS: "1"
          MAX_ATTEMPTS: "2"
        run: python -u orchestrator.py ${{ matrix.i }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: factory-results-${{ matrix.i }}
          path: |
            out/factory_results.json
            out/factory/**/index.html
